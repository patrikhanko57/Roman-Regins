<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roman Reigns | The Tribal Chief</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* ----------------- Global Styles ----------------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron', sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
position: relative;
}


/* ---------------- FLOATING IMAGE ---------------- */

.floating-roman{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:420px;
max-width:80%;
pointer-events:none;
z-index:3;
animation: floatRoman 6s ease-in-out infinite;
filter: drop-shadow(0 0 30px red);
}

@keyframes floatRoman{
0%{transform:translate(-50%,-50%) translateY(0);}
50%{transform:translate(-50%,-50%) translateY(-25px);}
100%{transform:translate(-50%,-50%) translateY(0);}
}


/* -------------- Animated Background Glow -------------- */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:
radial-gradient(circle at 20% 20%, rgba(255,0,0,0.2), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,0,0,0.15), transparent 40%);

animation: backgroundPulse 15s infinite alternate;

z-index:-1;
}

@keyframes backgroundPulse{

0% { transform: scale(1) translate(0,0); opacity:0.9; }

50% { transform: scale(1.1) translate(10px,-10px); opacity:1; }

100% { transform: scale(1) translate(0,0); opacity:0.9; }

}


/* ----------------- Header ----------------- */

header{

text-align:center;

padding:40px;

background:linear-gradient(180deg,#000,#111);

border-bottom:2px solid red;

box-shadow:0 0 40px rgba(255,0,0,0.4);

}

header h1{

font-size:60px;

color:red;

letter-spacing:4px;

text-shadow:0 0 10px red,0 0 30px red,0 0 60px red;

animation: flicker 1.5s infinite;

}

header p{

margin-top:10px;

color:#bbb;

}


/* ----------------- Nav ----------------- */

nav{

display:flex;

justify-content:center;

gap:40px;

padding:20px;

background:#0c0c0c;

border-bottom:1px solid #222;

}

nav a{

color:white;

text-decoration:none;

font-size:18px;

position:relative;

}

nav a::after{

content:"";

position:absolute;

width:0;

height:2px;

background:red;

left:0;

bottom:-5px;

transition:0.4s;

}

nav a:hover::after{

width:100%;

}


/* ----------------- Hero ----------------- */

.hero{

height:90vh;

display:flex;

align-items:center;

justify-content:center;

flex-direction:column;

text-align:center;

background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
url("hero-image.jpg");

background-size:cover;

background-repeat:no-repeat;

background-position:center;

}

.hero h2{

font-size:90px;

color:red;

text-shadow:0 0 20px red,0 0 40px red,0 0 80px red;

animation: flicker 1.5s infinite;

}

.hero p{

font-size:22px;

margin-top:15px;

color:#bbb;

}


/* ----------------- Hero Button ----------------- */

.hero button{

margin-top:35px;

padding:16px 35px;

font-size:18px;

border:none;

border-radius:6px;

background: linear-gradient(45deg,#ff0000,#700000,#ff0000);

background-size:200% 200%;

color:white;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 20px red;

animation: buttonGlow 3s linear infinite;

}

.hero button:hover{

transform: scale(1.08);

box-shadow:0 0 50px red,0 0 80px rgba(255,0,0,0.6);

}

@keyframes buttonGlow{

0% { background-position:0% 50%; }

50% { background-position:100% 50%; }

100% { background-position:0% 50%; }

}


/* ----------------- Sections ----------------- */

section{

max-width:1200px;

margin:auto;

padding:100px 30px;

}

h2{

font-size:40px;

color:red;

margin-bottom:30px;

text-shadow:0 0 10px red;

animation: flicker 1.5s infinite;

}


/* ----------------- Glass Cards ----------------- */

.card, .member, .achieve{

background: rgba(20,20,20,0.7);

backdrop-filter: blur(10px);

border-radius: 10px;

border:1px solid rgba(255,0,0,0.3);

box-shadow:0 0 30px rgba(255,0,0,0.25);

transition:0.3s;

}

.card:hover, .member:hover, .achieve:hover{

transform: translateY(-10px) scale(1.05);

box-shadow:0 0 60px red,0 0 90px rgba(255,0,0,0.6);

}


/* ----------------- Timeline ----------------- */

.timeline{

border-left:3px solid red;

padding-left:40px;

}

.timeline-item{

margin-bottom:50px;

position:relative;

}

.timeline-item::before{

content:"";

position:absolute;

left:-44px;

top:8px;

width:18px;

height:18px;

background:red;

border-radius:50%;

box-shadow:0 0 20px red;

animation: pulse 2s infinite;

}

.year{

font-weight:bold;

color:red;

margin-bottom:5px;

}


/* ----------------- Bloodline ----------------- */

.bloodline{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:30px;

}

.member h3{

margin-bottom:10px;

}


/* ----------------- Achievements ----------------- */

.achievements{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}


/* ----------------- Video ----------------- */

.video-container{

position: relative;

display:flex;

justify-content:center;

}

.video-container iframe{

width:85%;

height:500px;

border-radius:10px;

border:2px solid red;

box-shadow:0 0 30px red,0 0 60px rgba(255,0,0,0.5);

}

.video-container::before{

content:"";

position:absolute;

top:-10px;

left:-10px;

right:-10px;

bottom:-10px;

border-radius:12px;

box-shadow:0 0 60px red,0 0 120px rgba(255,0,0,0.4);

pointer-events:none;

animation: glowPulse 4s infinite alternate;

z-index:1;

}


/* ----------------- Footer ----------------- */

footer{

text-align:center;

padding:40px;

background:#000;

border-top:2px solid red;

margin-top:80px;

}

.credit{

color:red;

text-shadow:0 0 5px red,0 0 10px red,0 0 20px red,0 0 30px red;

font-weight:bold;

font-size:18px;

margin-bottom:15px;

}


/* ----------------- Animations ----------------- */

@keyframes flicker{

0%,19%,21%,23%,25%,54%,56%,100% { opacity:1; }

20%,22%,24%,55% { opacity:0.4; }

}

@keyframes pulse{

0% { transform: scale(1); opacity:1; }

50% { transform: scale(1.3); opacity:0.7; }

100% { transform: scale(1); opacity:1; }

}

@keyframes glowPulse{

0% { box-shadow:0 0 40px red,0 0 80px rgba(255,0,0,0.4); }

50% { box-shadow:0 0 80px red,0 0 150px rgba(255,0,0,0.6); }

100% { box-shadow:0 0 40px red,0 0 80px rgba(255,0,0,0.4); }

}

</style>

</head>

<body>


<img src="roman.png" class="floating-roman">


<header>
<h1>ROMAN REIGNS</h1>
<p>The Tribal Chief • Head of the Table</p>
</header>

<nav>
<a href="#about">About</a>
<a href="#timeline">Career Timeline</a>
<a href="#bloodline">The Bloodline</a>
<a href="#achievements">Achievements</a>
<a href="#video">Entrance</a>
</nav>

<div class="hero">
<h2>Acknowledge Him</h2>
<p>The most dominant champion in modern WWE</p>

<button onclick="document.getElementById('video').scrollIntoView({behavior:'smooth'})">
▶ Watch Roman Reigns Entrance
</button>

</div>

<body></body>
